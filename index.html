<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor - Lançamento de Estoque Diário e Relatórios</title>
    <style>
        :root {
            --primary-color: #4f46e5;
            --primary-hover: #4338ca;
            --background: #f3f4f6;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #1f2937;
            --border-color: #e5e7eb;
            --success-color: #10b981;
            --report-color: #d97706;
            --pdf-color: #dc2626;
            --pdf-hover: #b91c1c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            margin: 0;
            padding: 20px;
            color: var(--text-main);
            min-height: 100vh;
        }

        .container {
            max-width: 1300px;
            margin: 0 auto;
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            padding: 24px;
        }

        h1 {
            margin-top: 0;
            font-size: 24px;
            color: #312e81;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .filter-container {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 16px;
        }

        .select-dia, .input-data {
            padding: 8px 16px;
            font-size: 16px;
            font-weight: 600;
            color: var(--primary-color);
            background-color: white;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            cursor: pointer;
            outline: none;
            transition: all 0.2s;
        }

        .cadastro-container {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .cadastro-title {
            font-size: 16px;
            font-weight: 600;
            color: #312e81;
            margin-bottom: 12px;
            margin-top: 0;
        }

        .cadastro-form {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            align-items: flex-end;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            flex: 1;
            min-width: 150px;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #4b5563;
        }

        .form-group input, .form-group select {
            padding: 8px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            outline: none;
        }

        .tabs-container {
            display: flex;
            gap: 5px;
            margin-bottom: 20px;
            overflow-x: auto;
            padding-bottom: 5px;
            border-bottom: 1px solid var(--border-color);
        }

        .tab-btn {
            background: #e5e7eb;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px 8px 0 0;
            font-weight: 600;
            color: #4b5563;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab-btn.active {
            background: var(--primary-color);
            color: white;
            box-shadow: 0 -2px 10px rgba(79, 70, 229, 0.2);
        }

        .tab-btn.report-tab {
            background: #fef3c7;
            color: #b45309;
            border: 1px solid #fde68a;
            margin-left: auto;
        }

        .tab-btn.report-tab.active {
            background: var(--report-color);
            color: white;
        }

        .table-responsive {
            overflow-x: auto;
            background: white;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 14px;
        }

        th {
            background-color: #f9fafb;
            color: #374151;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
        }

        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border-color);
        }

        tr:hover {
            background-color: #f3f4f6;
        }

        input[type="number"] {
            width: 80px;
            padding: 6px;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        input[type="number"]:focus {
            border-color: var(--primary-color);
            background-color: #eff6ff;
        }

        .formula-cell {
            background-color: #f9fafb;
            font-weight: 600;
            color: #374151;
            padding: 8px;
            display: inline-block;
            width: 80px;
            border-radius: 4px;
            text-align: center;
        }

        .negative {
            color: #dc2626;
            background-color: #fef2f2;
        }

        .positive-green {
            color: #059669;
            background-color: #ecfdf5;
        }

        .actions-bar {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
            gap: 12px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: background 0.2s;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-success {
            background-color: var(--success-color);
            color: white;
            height: 38px;
        }

        .btn-pdf {
            background-color: var(--pdf-color);
            color: white;
        }

        .btn-pdf:hover {
            background-color: var(--pdf-hover);
        }

        .report-banner {
            background-color: #fffbeb;
            border: 1px solid #fef3c7;
            border-left: 4px solid var(--report-color);
            padding: 14px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 14.5px;
            color: #92400e;
            display: none;
            line-height: 1.4;
        }

        .report-banner-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        @media print {
            body {
                background: none !important;
                color: #000 !important;
                padding: 0;
                margin: 0;
            }
            .container {
                box-shadow: none !important;
                backdrop-filter: none !important;
                background: white !important;
                padding: 0 !important;
                margin: 0 !important;
                max-width: 100% !important;
            }
            h1 .filter-container,
            .cadastro-container,
            .tabs-container,
            .actions-bar,
            .btn-pdf,
            #reportBanner strong,
            #reportBanner span:not(#banner-data-inicio) {
                display: none !important;
            }
            .report-banner {
                background: none !important;
                border: none !important;
                border-bottom: 2px dashed #000 !important;
                padding: 10px 0 !important;
                margin-bottom: 20px !important;
                color: #000 !important;
                display: block !important;
            }
            .report-banner::before {
                content: "RELATÓRIO ACUMULADO DA SEMANA - " !important;
                font-weight: bold !important;
            }
            table {
                width: 100% !important;
                border: 1px solid #000 !important;
            }
            th, td {
                border: 1px solid #000 !important;
                padding: 6px !important;
                color: #000 !important;
            }
            th {
                background-color: #eaeaea !important;
            }
            .formula-cell {
                background: none !important;
                border: none !important;
                width: auto !important;
                color: #000 !important;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span id="page-title">Lançamentos de Estoque</span>
        
        <div class="filter-container">
            <label for="data-sistema">Data Ref:</label>
            <input type="date" id="data-sistema" class="input-data" onchange="processarNovaData(this.value)">

            <div id="dia-filter-wrapper" style="display: flex; align-items: center; gap: 10px;">
                <label for="diaSemana">Dia:</label>
                <select id="diaSemana" class="select-dia" onchange="mudarDia(this.value)">
                    <option value="SEGUNDA">Segunda-feira</option>
                    <option value="TERÇA">Terça-feira</option>
                    <option value="QUARTA">Quarta-feira</option>
                    <option value="QUINTA">Quinta-feira</option>
                    <option value="SEXTA">Sexta-feira</option>
                    <option value="SÁBADO">Sábado</option>
                    <option value="DOMINGO">Domingo</option>
                </select>
            </div>
        </div>
    </h1>

    <div id="reportBanner" class="report-banner">
        <div class="report-banner-content">
            <div>
                📊 <strong>Modo Relatório Semanal Ativo (<span id="banner-data-inicio">--/--/----</span>):</strong> 
                Exibindo a somatória acumulada de Segunda a Domingo para os itens da categoria selecionada. Campos de edição desabilitados.
            </div>
            <button class="btn btn-pdf" onclick="gerarPDFCategoria()">
                📄 Gerar PDF da Categoria
            </button>
        </div>
    </div>

    <div class="cadastro-container" id="cadastroSection">
        <p class="cadastro-title">➕ Cadastrar Novo Produto no Sistema</p>
        <div class="cadastro-form">
            <div class="form-group">
                <label for="newProdNome">Nome do Produto</label>
                <input type="text" id="newProdNome" placeholder="Ex: COCA-COLA LATA">
            </div>
            <div class="form-group">
                <label for="newProdUnid">Unidade</label>
                <select id="newProdUnid">
                    <option value="UNI">UNI</option>
                    <option value="KG">KG</option>
                    <option value="CX">CX</option>
                    <option value="DOSE">DOSE</option>
                    <option value="PCT">PCT</option>
                </select>
            </div>
            <div class="form-group">
                <label for="newProdCategoria">Categoria Destino</label>
                <select id="newProdCategoria">
                    <option value="BEBIDAS">BEBIDAS</option>
                    <option value="ESTOQUE_SECO">ESTOQUE SECO</option>
                    <option value="FRIOS">FRIOS</option>
                    <option value="HORTIFRUTI">HORTIFRUTI</option>
                    <option value="DESTILADOS">DESTILADOS</option>
                </select>
            </div>
            <button class="btn btn-success" onclick="cadastrarProduto()">Cadastrar Produto</button>
        </div>
    </div>

    <div class="tabs-container" id="tabs">
        <button class="tab-btn active" onclick="switchTab('BEBIDAS')">BEBIDAS</button>
        <button class="tab-btn" onclick="switchTab('ESTOQUE_SECO')">ESTOQUE SECO</button>
        <button class="tab-btn" onclick="switchTab('FRIOS')">FRIOS</button>
        <button class="tab-btn" onclick="switchTab('HORTIFRUTI')">HORTIFRUTI</button>
        <button class="tab-btn" onclick="switchTab('DESTILADOS')">DESTILADOS</button>
        <button class="tab-btn report-tab" onclick="switchTab('RELATORIOS')">📊 RELATÓRIOS SEMANAIS</button>
    </div>

    <div class="table-responsive">
        <table>
            <thead id="table-header"></thead>
            <tbody id="inventory-grid"></tbody>
        </table>
    </div>

    <div class="actions-bar" id="actionsBar">
        <button class="btn btn-primary" onclick="salvarDados()">Salvar Lançamentos</button>
    </div>
</div>

<script>
    var abaAtual = 'BEBIDAS';
    var categoriaRelatorioFiltro = 'BEBIDAS'; 
    var diaAtual = 'SEGUNDA';
    var modoRelatorio = false;
    var estoqueDados = {};

    var listaProdutosPadrao = {
        BEBIDAS: [
            { produto: "HEIN. 600 ML", unid: "UNI" },
            { produto: "HEIN. LONG", unid: "UNI" },
            { produto: "AGUA COM GAS", unid: "UNI" },
            { produto: "SMINORF ICE", unid: "UNI" }
        ],
        ESTOQUE_SECO: [
            { produto: "FEIJÃO PRETO", unid: "KG" },
            { produto: "FEIJÃO MULATO", unid: "UNI" },
            { produto: "ARROZ", unid: "CX" },
            { produto: "MACARRÃO", unid: "UNI" }
        ],
        FRIOS: [
            { produto: "PICANHA", unid: "UNI" },
            { produto: "CONTRA FILÉ", unid: "UNI" },
            { produto: "MAMINHA", unid: "UNI" }
        ],
        HORTIFRUTI: [
            { produto: "ABACAXI", unid: "UNI" },
            { produto: "ALHO", unid: "KG" },
            { produto: "CEBOLA", unid: "KG" }
        ],
        DESTILADOS: [
            { produto: "J.WALKER BLACK LABEL", unid: "DOSE" },
            { produto: "J. WALKER RED LABEL", unid: "DOSE" }
        ]
    };

    window.onload = function() {
        var hoje = new Date().toISOString().split('T')[0];
        var inputData = document.getElementById('data-sistema');
        if(inputData) inputData.value = hoje;
        
        carregarDadosDaSemana(hoje);
        renderTable();
    };

    function criarEstruturaDias(estoqueInicialPadrao) {
        var dias = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];
        var estrutura = {};
        dias.forEach(function(dia) {
            estrutura[dia] = { inicial: estoqueInicialPadrao, entrada: 0, vendas: 0, perda: 0, final: estoqueInicialPadrao };
        });
        return estrutura;
    }

    function obterSegundaFeira(dataInput) {
        var data = dataInput ? new Date(dataInput) : new Date();
        data.setMinutes(data.getMinutes() + data.getTimezoneOffset());
        var diaSemana = data.getDay(); 
        var diferenca = data.getDate() - diaSemana + (diaSemana === 0 ? -6 : 1); 
        return new Date(data.setDate(diferenca));
    }

    function formatarDataBR(data) {
        if (!data || isNaN(data.getTime())) return "--/--/----";
        var dia = String(data.getDate()).padStart(2, '0');
        var mes = String(data.getMonth() + 1).padStart(2, '0');
        var ano = data.getFullYear();
        return dia + "/" + mes + "/" + ano;
    }

    function formatarChaveSemana(data) {
        var seg = obterSegundaFeira(data);
        var dia = String(seg.getDate()).padStart(2, '0');
        var mes = String(seg.getMonth() + 1).padStart(2, '0');
        var ano = seg.getFullYear();
        return "estoque_semana_" + ano + "_" + mes + "_" + dia;
    }

    function carregarDadosDaSemana(dataRef) {
        var chave = formatarChaveSemana(dataRef);
        var dadosSalvos = localStorage.getItem(chave);

        if (dadosSalvos) {
            estoqueDados = JSON.parse(dadosSalvos);
        } else {
            estoqueDados = {};
            for (var categoria in listaProdutosPadrao) {
                estoqueDados[categoria] = listaProdutosPadrao[categoria].map(function(p) {
                    return {
                        produto: p.produto,
                        unid: p.unid,
                        lancamentos: criarEstruturaDias(0)
                    };
                });
            }
        }
    }

    function processarNovaData(novaData) {
        carregarDadosDaSemana(novaData);
        if (modoRelatorio) {
            atualizarDatasRelatorio();
        }
        renderTable();
    }

    function atualizarDatasRelatorio() {
        var dataInputGlobal = document.getElementById('data-sistema').value;
        var segundaFeira = obterSegundaFeira(dataInputGlobal);
        var segundaFormatada = formatarDataBR(segundaFeira);

        var campoDataBanner = document.getElementById('banner-data-inicio');
        if (campoDataBanner) {
            campoDataBanner.innerText = segundaFormatada;
        }

        var tituloRelatorio = document.getElementById('page-title');
        if (tituloRelatorio && modoRelatorio) {
            tituloRelatorio.innerText = "Semana de: " + segundaFormatada + " [Categoria: " + categoriaRelatorioFiltro.replace('_', ' ') + "]";
        }
    }

    function gerarPDFCategoria() {
        var dataInputGlobal = document.getElementById('data-sistema').value;
        var segundaFeira = obterSegundaFeira(dataInputGlobal);
        var segundaFormatada = formatarDataBR(segundaFeira).replace(/\//g, '-');
        
        document.title = "Relatorio_Semanal_" + categoriaRelatorioFiltro + "_Iniciando_" + segundaFormatada;
        window.print();
        document.title = "Gestor - Lançamento de Estoque Diário e Relatórios";
    }

    function cadastrarProduto() {
        var nomeInput = document.getElementById('newProdNome');
        var unidSelect = document.getElementById('newProdUnid');
        var catSelect = document.getElementById('newProdCategoria');

        var nome = nomeInput.value.trim().toUpperCase();
        var unid = unidSelect.value;
        var categoriaTarget = catSelect.value;

        if (!nome) {
            alert('Por favor, digite o nome do produto!');
            return;
        }

        var existe = estoqueDados[categoriaTarget].some(function(item) { return item.produto === nome; });
        if (existe) {
            alert('Este produto já está cadastrado nesta categoria!');
            return;
        }

        estoqueDados[categoriaTarget].push({
            produto: nome,
            unid: unid,
            lancamentos: criarEstruturaDias(0)
        });

        var dataInputGlobal = document.getElementById('data-sistema').value;
        var chave = formatarChaveSemana(dataInputGlobal);
        localStorage.setItem(chave, JSON.stringify(estoqueDados));

        nomeInput.value = '';
        switchTab(categoriaTarget);
        alert('Produto "' + nome + '" adicionado com sucesso e salvo no sistema!');
    }

    function renderTableHeader() {
        var header = document.getElementById('table-header');
        if (modoRelatorio) {
            header.innerHTML = '<tr><th>Produto</th><th>Unid.</th><th>Inicial (Segunda)</th><th>Total Entrada</th><th>Total Vendas</th><th>Total Perda</th><th>Estoque Final Atual</th><th>Diferença Acumulada</th></tr>';
        } else {
            header.innerHTML = '<tr><th>Produto</th><th>Unid.</th><th>Estoque Inicial</th><th>Entrada</th><th>Vendas</th><th>Perda</th><th>Estoque Final</th><th>Diferença</th></tr>';
        }
    }

    function renderTable() {
        renderTableHeader();
        var tbody = document.getElementById('inventory-grid');
        tbody.innerHTML = '';

        if (modoRelatorio) {
            var temDados = false;
            var catKey = categoriaRelatorioFiltro;

            if (estoqueDados[catKey]) {
                estoqueDados[catKey].forEach(function(item) {
                    temDados = true;
                    var totalEntrada = 0;
                    var totalVendas = 0;
                    var totalPerda = 0;
                    
                    var dias = ['SEGUNDA', 'TERÇA', 'QUARTA', 'QUINTA', 'SEXTA', 'SÁBADO', 'DOMINGO'];
                    var estoqueInicialSemana = item.lancamentos['SEGUNDA'].inicial;
                    var estoqueFinalSemana = item.lancamentos['DOMINGO'].final;

                    dias.forEach(function(d) {
                        totalEntrada += item.lancamentos[d].entrada;
                        totalVendas += item.lancamentos[d].vendas;
                        totalPerda += item.lancamentos[d].perda;
                    });

                    var saldoEsperadoSemanal = estoqueInicialSemana + totalEntrada - totalVendas - totalPerda;
                    var diferencaSemanal = estoqueFinalSemana - saldoEsperadoSemanal;

                    var tr = document.createElement('tr');
                    var classDif = diferencaSemanal < 0 ? 'negative' : (diferencaSemanal > 0 ? 'positive-green' : '');
                    tr.innerHTML = '<td><strong>' + item.produto + '</strong></td>' +
                        '<td><span style="color:#6b7280; font-weight:600;">' + item.unid + '</span></td>' +
                        '<td><span class="formula-cell">' + estoqueInicialSemana + '</span></td>' +
                        '<td><span class="formula-cell" style="color:#1e40af;">' + totalEntrada + '</span></td>' +
                        '<td><span class="formula-cell" style="color:#991b1b;">' + totalVendas + '</span></td>' +
                        '<td><span class="formula-cell" style="color:#9a3412;">' + totalPerda + '</span></td>' +
                        '<td><span class="formula-cell" style="color:#166534;">' + estoqueFinalSemana + '</span></td>' +
                        '<td><span class="formula-cell ' + classDif + '">' + (diferencaSemanal > 0 ? '+' + diferencaSemanal : diferencaSemanal) + '</span></td>';
                    tbody.appendChild(tr);
                });
            }

            if (!temDados) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#9ca3af;">Nenhum produto encontrado.</td></tr>';
            }

        } else {
            if (!estoqueDados[abaAtual] || estoqueDados[abaAtual].length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align:center; color:#9ca3af;">Nenhum produto cadastrado nesta categoria.</td></tr>';
                return;
            }

            estoqueDados[abaAtual].forEach(function(item, index) {
                var valoresDia = item.lancamentos[diaAtual];
                var saldoEsperado = valoresDia.inicial + valoresDia.entrada - valoresDia.vendas - valoresDia.perda;
                var diferenca = valoresDia.final - saldoEsperado;

                var tr = document.createElement('tr');
                var classDif = diferenca < 0 ? 'negative' : (diferenca > 0 ? 'positive-green' : '');
                tr.innerHTML = '<td><strong>' + item.produto + '</strong></td>' +
                    '<td>' + item.unid + '</td>' +
                    '<td><input type="number" value="' + valoresDia.inicial + '" onchange="updateValue(' + index + ', \'inicial\', this.value)"></td>' +
                    '<td><input type="number" value="' + valoresDia.entrada + '" onchange="updateValue(' + index + ', \'entrada\', this.value)"></td>' +
                    '<td><input type="number" value="' + valoresDia.vendas + '" onchange="updateValue(' + index + ', \'vendas\', this.value)"></td>' +
                    '<td><input type="number" value="' + valoresDia.perda + '" onchange="updateValue(' + index + ', \'perda\', this.value)"></td>' +
                    '<td><input type="number" value="' + valoresDia.final + '" onchange="updateValue(' + index + ', \'final\', this.value)"></td>' +
                    '<td><span class="formula-cell ' + classDif + '">' + (diferenca > 0 ? '+' + diferenca : diferenca) + '</span></td>';
                tbody.appendChild(tr);
            });
        }
    }

    function updateValue(index, field, value) {
        estoqueDados[abaAtual][index].lancamentos[diaAtual][field] = parseFloat(value) || 0;
        renderTable(); 
    }

    function mudarDia(novoDia) {
        diaAtual = novoDia;
        renderTable();
    }

    function switchTab(tabName) {
        if (tabName === 'RELATORIOS') {
            modoRelatorio = true;
            abaAtual = 'RELATORIOS';
            
            document.getElementById('dia-filter-wrapper').style.display = 'none';
            document.getElementById('cadastroSection').style.display = 'none';
            document.getElementById('actionsBar').style.display = 'none';
            document.getElementById('reportBanner').style.display = 'block';
            
            atualizarDatasRelatorio();
        } else {
            modoRelatorio = false;
            abaAtual = tabName;
            categoriaRelatorioFiltro = tabName; 
            
            document.getElementById('dia-filter-wrapper').style.display = 'flex';
            document.getElementById('cadastroSection').style.display = 'block';
            document.getElementById('actionsBar').style.display = 'flex';
            document.getElementById('reportBanner').style.display = 'none';
            document.getElementById('page-title').innerText = 'Lançamentos de Estoque';
        }
        
        atualizarLayoutAbas();
        renderTable();
    }

    function atualizarLayoutAbas() {
        var buttons = document.querySelectorAll('.tab-btn');
        for (var i = 0; i < buttons.length; i++) {
            var btn = buttons[i];
            var btnText = btn.innerText;
            if (abaAtual === 'RELATORIOS' && btn.classList.contains('report-tab')) {
                btn.classList.add('active');
            } else if (btnText === abaAtual || (abaAtual === 'ESTOQUE_SECO' && btnText === 'ESTOQUE SECO')) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }
    }

    function salvarDados() {
        var dataInputGlobal = document.getElementById('data-sistema').value;
        var chave = formatarChaveSemana(dataInputGlobal);
        
        localStorage.setItem(chave, JSON.stringify(estoqueDados));
        
        alert('Sucesso! Todos os lançamentos da semana foram gravados no seu computador.');
    }
</script>

</body>
</html>
